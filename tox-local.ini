[tox]
min_version = 4.0
envlist = clean, py313, report

[testenv:clean]
description = Erase previous coverage reports
deps = coverage
skip_install = true
commands =
    coverage erase

[testenv]
description = Run local test suite
package = editable
depends = clean
dependency_groups =
    tests
commands =
    pytest {posargs:tests} --cov-append

[testenv:report]
description = Generate final coverage report
deps = coverage
skip_install = true
depends = py313
commands =
    coverage report
    coverage html
