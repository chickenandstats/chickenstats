site_name: chickenstats

site_author: Chicken and Stats

repo_url: https://github.com/chickenandstats/chickenstats

nav:
  - Home:
    - Introduction: 'index.md'
    - 'Getting Started': 'home/getting_started.md'
    - Help: 'home/help.md'
  - 'User Guide': 
    - Overview: 'guide/overview.md'
    - Tutorials: 'guide/chicken_nhl.md'
    - Examples: 'guide/evolving_hockey.md'
  - Reference:
    - chicken_nhl: #'guide/overview.md'
      - Architecture: 'guide/overview.md'
    - evolving_hockey: 'guide/overview.md'
    - capfriendly: 'guide/overview.md'

theme:

  name: material

  features:
    - content.code.annotation
    - content.code.copy
    - content.tabs.link
    - header.autohide
    - navigation.instant
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - toc.integrate
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: 
        icon: material/toggle-switch
        name: Switch to dark mode 
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: 
        icon: material/toggle-switch-off-outline
        name: Switch to light mode 

  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/chickenandstats
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/chickenandstats

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

copyright: |
  &copy; 2023 <a href="https://www.chickenandstats.com"  target="_blank" rel="noopener">Chicken and Stats</a>




