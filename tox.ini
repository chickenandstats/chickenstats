[tox]
min_version = 4.0
env_list = {py310,py311,py312,py313}-{lin,mac,win}

[testenv]
skip_install = False
platform = lin: linux
           mac: darwin
           win: win32
passenv = *
setenv =
    CHICKENSTATS_USERNAME={env:CHICKENSTATS_USERNAME}
    CHICKENSTATS_PASSWORD={env:CHICKENSTATS_PASSWORD}
commands =
    pytest {posargs} --cache-clear
package = editable
dependency_groups =
    tests

[gh]
python =
    3.10 = py310
    3.11 = py311
    3.12 = py312
    3.13 = py313

